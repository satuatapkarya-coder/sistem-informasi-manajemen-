<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM ERP - Sistem Informasi Manajemen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
        }
        
        .sidebar-gradient { 
            background: #0F172A; 
        }
        
        .custom-shadow { 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); 
        }
        
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        
        .active-tab { 
            background: #2563EB; 
            color: white; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); 
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Color classes for dynamic styling */
        .color-blue-bg { background-color: #EFF6FF; }
        .color-blue-text { color: #2563EB; }
        
        .color-green-bg { background-color: #F0FDF4; }
        .color-green-text { color: #16A34A; }
        
        .color-amber-bg { background-color: #FFFBEB; }
        .color-amber-text { color: #D97706; }
        
        .color-rose-bg { background-color: #FFF1F2; }
        .color-rose-text { color: #E11D48; }
        
        .color-purple-bg { background-color: #F3E8FF; }
        .color-purple-text { color: #7C3AED; }
        
        /* Mobile Specific Optimizations */
        @media (max-width: 768px) {
            .main-content { 
                padding-bottom: 80px; 
            }
            .card-grid { 
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTS ---

        const LoginPage = ({ onLogin }) => {
            const [loading, setLoading] = useState(false);
            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => onLogin({ name: 'Titha Egis Tina', role: 'Super Admin' }), 800);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="w-full max-w-md bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100">
                        <div className="flex justify-center mb-6">
                            <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                                <i data-lucide="shield-check" className="w-8 h-8"></i>
                            </div>
                        </div>
                        <h2 className="text-2xl font-extrabold text-center text-slate-800">SIM ERP</h2>
                        <p className="text-slate-500 text-center mb-8 text-sm font-medium">Enterprise Management System</p>
                        
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="Email" required className="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all" />
                            <input type="password" placeholder="Password" required className="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all" />
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                                {loading ? "Logging in..." : "Sign In"} <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const BottomNav = ({ activeTab, setActiveTab }) => (
            <div className="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-200 px-6 py-3 flex justify-between items-center z-[100]">
                <NavItemMobile active={activeTab === 'dashboard'} icon="layout-dashboard" onClick={() => setActiveTab('dashboard')} />
                <NavItemMobile active={activeTab === 'master'} icon="database" onClick={() => setActiveTab('master')} />
                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg -mt-10 border-4 border-white cursor-pointer hover:bg-blue-700 transition-all" onClick={() => setActiveTab('transaksi')}>
                    <i data-lucide="plus" className="w-6 h-6"></i>
                </div>
                <NavItemMobile active={activeTab === 'laporan'} icon="file-text" onClick={() => setActiveTab('laporan')} />
                <NavItemMobile active={activeTab === 'settings'} icon="settings" onClick={() => setActiveTab('settings')} />
            </div>
        );

        const NavItemMobile = ({ active, icon, onClick }) => (
            <button onClick={onClick} className={`p-2 rounded-xl transition-all ${active ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
                <i data-lucide={icon} className="w-6 h-6"></i>
            </button>
        );

        const Sidebar = ({ activeTab, setActiveTab, isOpen, setIsOpen }) => {
            const menus = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'master', label: 'Master Data', icon: 'database' },
                { id: 'transaksi', label: 'Transaksi', icon: 'shopping-cart' },
                { id: 'laporan', label: 'Laporan', icon: 'file-text' },
                { id: 'settings', label: 'Pengaturan', icon: 'settings' },
            ];

            return (
                <>
                    {/* Overlay for mobile */}
                    {isOpen && <div className="fixed inset-0 bg-black/50 z-[101] md:hidden" onClick={() => setIsOpen(false)}></div>}
                    
                    <div className={`fixed inset-y-0 left-0 w-72 sidebar-gradient text-white transform ${isOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 z-50 md:relative md:z-0 overflow-y-auto`}>
                        <div className="p-8 flex items-center gap-3 sticky top-0 bg-opacity-100">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                                <span className="font-extrabold text-xl">S</span>
                            </div>
                            <span className="text-xl font-bold tracking-tight">SIM <span className="text-blue-500">ERP</span></span>
                        </div>
                        <nav className="px-4 mt-4 space-y-2">
                            {menus.map(menu => (
                                <button 
                                    key={menu.id}
                                    onClick={() => { setActiveTab(menu.id); setIsOpen(false); }}
                                    className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all ${activeTab === menu.id ? 'active-tab' : 'text-slate-400 hover:text-white hover:bg-white/10'}`}
                                >
                                    <i data-lucide={menu.icon} className="w-5 h-5"></i>
                                    <span className="font-semibold text-sm">{menu.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>
                </>
            );
        };

        const Dashboard = ({ userName }) => {
            useEffect(() => {
                const chartElement = document.getElementById('mainChart');
                if (chartElement) {
                    const ctx = chartElement.getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Ming'],
                            datasets: [{
                                label: 'Transaksi',
                                data: [30, 45, 35, 60, 50, 75, 80],
                                borderColor: '#2563EB',
                                borderWidth: 4,
                                pointRadius: 0,
                                tension: 0.4,
                                fill: true,
                                backgroundColor: (context) => {
                                    const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 300);
                                    gradient.addColorStop(0, 'rgba(37, 99, 235, 0.2)');
                                    gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');
                                    return gradient;
                                },
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { 
                                x: { 
                                    grid: { display: false },
                                    border: { display: false }
                                }, 
                                y: { 
                                    display: false,
                                    border: { display: false }
                                } 
                            }
                        }
                    });
                }
                lucide.createIcons();
            }, []);

            const firstName = userName.split(' ')[0];

            return (
                <div className="space-y-6 animate-fade-in">
                    {/* Welcome Header */}
                    <div className="flex flex-col md:flex-row justify-between md:items-center bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Hi, {firstName}! 👋</h1>
                            <p className="text-slate-500 text-sm">Berikut ringkasan bisnis Anda hari ini.</p>
                        </div>
                        <div className="mt-4 md:mt-0 flex gap-2 overflow-x-auto no-scrollbar">
                            <span className="px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-xs font-bold whitespace-nowrap">Harian</span>
                            <span className="px-4 py-2 text-slate-400 rounded-full text-xs font-bold whitespace-nowrap cursor-pointer hover:bg-slate-50 transition-all">Mingguan</span>
                            <span className="px-4 py-2 text-slate-400 rounded-full text-xs font-bold whitespace-nowrap cursor-pointer hover:bg-slate-50 transition-all">Bulanan</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                        <StatCard label="User" value="12" color="blue" icon="users" />
                        <StatCard label="Produk" value="854" color="green" icon="box" />
                        <StatCard label="Income" value="84M" color="amber" icon="trending-up" />
                        <StatCard label="Pending" value="5" color="rose" icon="alert-circle" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm h-[350px]">
                            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <i data-lucide="bar-chart-2" className="w-5 h-5 text-blue-600"></i> Tren Penjualan
                            </h3>
                            <div className="h-full pb-10">
                                <canvas id="mainChart"></canvas>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                            <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i data-lucide="bell" className="w-5 h-5 text-blue-600"></i> Notifikasi
                            </h3>
                            <div className="space-y-4">
                                <NotificationItem title="Stok Hampir Habis" desc="MacBook Pro M2 sisa 2 unit lagi." type="warning" />
                                <NotificationItem title="User Baru" desc="Budi admin baru saja didaftarkan." type="info" />
                                <NotificationItem title="Approval" desc="Manager menyetujui transaksi #TRX01." type="success" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, icon, color }) => {
            const colorClasses = {
                blue: { bg: 'color-blue-bg', text: 'color-blue-text' },
                green: { bg: 'color-green-bg', text: 'color-green-text' },
                amber: { bg: 'color-amber-bg', text: 'color-amber-text' },
                rose: { bg: 'color-rose-bg', text: 'color-rose-text' }
            };

            const { bg, text } = colorClasses[color] || colorClasses.blue;

            return (
                <div className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col justify-between h-32 md:h-40">
                    <div className={`w-10 h-10 md:w-12 md:h-12 ${bg} ${text} rounded-2xl flex items-center justify-center`}>
                        <i data-lucide={icon} className="w-5 h-5 md:w-6 md:h-6"></i>
                    </div>
                    <div>
                        <h4 className="text-xl md:text-2xl font-extrabold text-slate-800 leading-none">{value}</h4>
                        <p className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider mt-1">{label}</p>
                    </div>
                </div>
            );
        };

        const NotificationItem = ({ title, desc, type }) => (
            <div className="flex gap-4 p-3 hover:bg-slate-50 rounded-2xl transition-all cursor-pointer">
                <div className={`w-2 h-10 rounded-full ${type === 'warning' ? 'bg-amber-400' : type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`}></div>
                <div>
                    <p className="text-sm font-bold text-slate-800 leading-none mb-1">{title}</p>
                    <p className="text-xs text-slate-400 line-clamp-1">{desc}</p>
                </div>
            </div>
        );

        const MasterData = () => {
            const [data, setData] = useState([
                { id: 1, name: 'MacBook Pro M2', sku: 'LAP-001', stock: 12, price: '25jt', status: 'In Stock' },
                { id: 2, name: 'iPhone 15 Pro', sku: 'PHN-002', stock: 3, price: '21jt', status: 'Low Stock' },
                { id: 3, name: 'iPad Air 5', sku: 'TAB-003', stock: 25, price: '12jt', status: 'In Stock' },
            ]);

            const [showForm, setShowForm] = useState(false);
            const [newProduct, setNewProduct] = useState({ name: '', sku: '', stock: '', price: '' });

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (newProduct.name && newProduct.sku && newProduct.stock && newProduct.price) {
                    setData([...data, {
                        id: data.length + 1,
                        ...newProduct,
                        stock: parseInt(newProduct.stock),
                        status: parseInt(newProduct.stock) <= 5 ? 'Low Stock' : 'In Stock'
                    }]);
                    setNewProduct({ name: '', sku: '', stock: '', price: '' });
                    setShowForm(false);
                }
            };

            useEffect(() => lucide.createIcons(), []);

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-xl font-bold text-slate-800">Master Produk</h2>
                        <button onClick={() => setShowForm(!showForm)} className="bg-blue-600 text-white p-3 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                            <i data-lucide="plus" className="w-5 h-5"></i>
                        </button>
                    </div>

                    {showForm && (
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <h3 className="font-bold text-slate-800 mb-4">Tambah Produk Baru</h3>
                            <form onSubmit={handleAddProduct} className="space-y-4">
                                <input type="text" placeholder="Nama Produk" required value={newProduct.name} onChange={(e) => setNewProduct({...newProduct, name: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <input type="text" placeholder="SKU" required value={newProduct.sku} onChange={(e) => setNewProduct({...newProduct, sku: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <input type="number" placeholder="Stok" required value={newProduct.stock} onChange={(e) => setNewProduct({...newProduct, stock: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <input type="text" placeholder="Harga" required value={newProduct.price} onChange={(e) => setNewProduct({...newProduct, price: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <div className="flex gap-2">
                                    <button type="submit" className="flex-1 bg-green-600 text-white py-2 rounded-xl hover:bg-green-700 transition-all">Simpan</button>
                                    <button type="button" onClick={() => setShowForm(false)} className="flex-1 bg-slate-300 text-slate-800 py-2 rounded-xl hover:bg-slate-400 transition-all">Batal</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Product List */}
                    <div className="grid grid-cols-1 gap-4">
                        {data.map(item => (
                            <div key={item.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400">
                                        <i data-lucide="box"></i>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-slate-800 text-sm">{item.name}</h4>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tight">{item.sku} • {item.price}</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className={`text-xs font-extrabold ${item.stock <= 5 ? 'text-rose-500' : 'text-green-500'}`}>
                                        {item.stock} unit
                                    </p>
                                    <p className="text-[10px] text-slate-400 font-medium">Sisa Stok</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const Transaksi = () => {
            const [transactions, setTransactions] = useState([
                { id: 'TRX-001', date: '2024-01-15', product: 'MacBook Pro M2', qty: 2, total: '50jt', status: 'Selesai' },
                { id: 'TRX-002', date: '2024-01-14', product: 'iPhone 15 Pro', qty: 5, total: '105jt', status: 'Menunggu' },
                { id: 'TRX-003', date: '2024-01-13', product: 'iPad Air 5', qty: 3, total: '36jt', status: 'Selesai' },
            ]);

            const [showForm, setShowForm] = useState(false);
            const [newTx, setNewTx] = useState({ product: '', qty: '', total: '' });

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (newTx.product && newTx.qty && newTx.total) {
                    setTransactions([...transactions, {
                        id: `TRX-${String(transactions.length + 1).padStart(3, '0')}`,
                        date: new Date().toISOString().split('T')[0],
                        ...newTx,
                        status: 'Menunggu'
                    }]);
                    setNewTx({ product: '', qty: '', total: '' });
                    setShowForm(false);
                }
            };

            useEffect(() => lucide.createIcons(), []);

            return (
                <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-xl font-bold text-slate-800">Transaksi Penjualan</h2>
                        <button onClick={() => setShowForm(!showForm)} className="bg-blue-600 text-white p-3 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                            <i data-lucide="plus" className="w-5 h-5"></i>
                        </button>
                    </div>

                    {showForm && (
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <h3 className="font-bold text-slate-800 mb-4">Tambah Transaksi Baru</h3>
                            <form onSubmit={handleAddTransaction} className="space-y-4">
                                <input type="text" placeholder="Nama Produk" required value={newTx.product} onChange={(e) => setNewTx({...newTx, product: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <input type="number" placeholder="Jumlah" required value={newTx.qty} onChange={(e) => setNewTx({...newTx, qty: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <input type="text" placeholder="Total" required value={newTx.total} onChange={(e) => setNewTx({...newTx, total: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 outline-none" />
                                <div className="flex gap-2">
                                    <button type="submit" className="flex-1 bg-green-600 text-white py-2 rounded-xl hover:bg-green-700 transition-all">Simpan</button>
                                    <button type="button" onClick={() => setShowForm(false)} className="flex-1 bg-slate-300 text-slate-800 py-2 rounded-xl hover:bg-slate-400 transition-all">Batal</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Transaction List */}
                    <div className="grid grid-cols-1 gap-4">
                        {transactions.map(tx => (
                            <div key={tx.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="font-bold text-slate-800">{tx.id}</p>
                                        <p className="text-xs text-slate-400">{tx.date}</p>
                                    </div>
                                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${tx.status === 'Selesai' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                                        {tx.status}
                                    </span>
                                </div>
                                <div className="mt-3 border-t pt-3">
                                    <p className="text-sm font-semibold text-slate-800">{tx.product} x {tx.qty}</p>
                                    <p className="text-sm text-blue-600 font-bold">Total: {tx.total}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const Laporan = () => {
            useEffect(() => {
                const chartElement = document.getElementById('reportChart');
                if (chartElement) {
                    const ctx = chartElement.getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
                            datasets: [
                                {
                                    label: 'Penjualan',
                                    data: [120, 190, 150, 220, 180, 250],
                                    backgroundColor: '#2563EB',
                                },
                                {
                                    label: 'Biaya',
                                    data: [80, 120, 100, 140, 110, 160],
                                    backgroundColor: '#EF4444',
                                }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: { legend: { display: true } },
                        }
                    });
                }
                lucide.createIcons();
            }, []);

            return (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="text-xl font-bold text-slate-800">Laporan Keuangan</h2>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-slate-500 text-sm">Total Penjualan</p>
                                    <p className="text-2xl font-bold text-slate-800">Rp 1.2M</p>
                                </div>
                                <div className="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center">
                                    <i data-lucide="trending-up" className="w-6 h-6 text-blue-600"></i>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-slate-500 text-sm">Total Biaya</p>
                                    <p className="text-2xl font-bold text-slate-800">Rp 650K</p>
                                </div>
                                <div className="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center">
                                    <i data-lucide="trending-down" className="w-6 h-6 text-red-600"></i>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-slate-500 text-sm">Keuntungan</p>
                                    <p className="text-2xl font-bold text-green-600">Rp 550K</p>
                                </div>
                                <div className="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center">
                                    <i data-lucide="award" className="w-6 h-6 text-green-600"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm h-[400px]">
                        <h3 className="font-bold text-slate-800 mb-4">Grafik Penjualan vs Biaya</h3>
                        <canvas id="reportChart"></canvas>
                    </div>
                </div>
            );
        };

        const Settings = () => {
            const [settings, setSettings] = useState({
                companyName: 'PT Titha Egis Tina',
                email: 'titha@simerpindonesia.com',
                phone: '+62 812-3456-7890',
                address: 'Jl. Merdeka No. 123, Jakarta',
                currency: 'IDR'
            });

            const [editMode, setEditMode] = useState(false);

            useEffect(() => lucide.createIcons(), []);

            const handleSave = () => {
                setEditMode(false);
                alert('Pengaturan berhasil disimpan!');
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="text-xl font-bold text-slate-800">Pengaturan Sistem</h2>

                    <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-slate-800">Informasi Perusahaan</h3>
                            <button onClick={() => setEditMode(!editMode)} className="bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700 transition-all">
                                {editMode ? 'Batal' : 'Edit'}
                            </button>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="text-sm font-semibold text-slate-700">Nama Perusahaan</label>
                                <input 
                                    type="text" 
                                    disabled={!editMode}
                                    value={settings.companyName}
                                    onChange={(e) => setSettings({...settings, companyName: e.target.value})}
                                    className="w-full mt-1 px-4 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
                                />
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-slate-700">Email</label>
                                <input 
                                    type="email" 
                                    disabled={!editMode}
                                    value={settings.email}
                                    onChange={(e) => setSettings({...settings, email: e.target.value})}
                                    className="w-full mt-1 px-4 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
                                />
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-slate-700">Telepon</label>
                                <input 
                                    type="text" 
                                    disabled={!editMode}
                                    value={settings.phone}
                                    onChange={(e) => setSettings({...settings, phone: e.target.value})}
                                    className="w-full mt-1 px-4 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
                                />
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-slate-700">Alamat</label>
                                <textarea 
                                    disabled={!editMode}
                                    value={settings.address}
                                    onChange={(e) => setSettings({...settings, address: e.target.value})}
                                    className="w-full mt-1 px-4 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
                                    rows="3"
                                />
                            </div>

                            <div>
                                <label className="text-sm font-semibold text-slate-700">Mata Uang</label>
                                <select 
                                    disabled={!editMode}
                                    value={settings.currency}
                                    onChange={(e) => setSettings({...settings, currency: e.target.value})}
                                    className="w-full mt-1 px-4 py-2 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
                                >
                                    <option>IDR</option>
                                    <option>USD</option>
                                    <option>EUR</option>
                                </select>
                            </div>

                            {editMode && (
                                <button onClick={handleSave} className="w-full bg-green-600 text-white py-2 rounded-xl hover:bg-green-700 transition-all font-semibold">
                                    Simpan Perubahan
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                        <h3 className="font-bold text-slate-800 mb-4">Preferensi Sistem</h3>
                        <div className="space-y-4">
                            <div className="flex items-center justify-between">
                                <label className="text-sm font-semibold text-slate-700">Mode Gelap</label>
                                <input type="checkbox" className="w-5 h-5 rounded cursor-pointer" />
                            </div>
                            <div className="flex items-center justify-between">
                                <label className="text-sm font-semibold text-slate-700">Notifikasi Email</label>
                                <input type="checkbox" className="w-5 h-5 rounded cursor-pointer" defaultChecked />
                            </div>
                            <div className="flex items-center justify-between">
                                <label className="text-sm font-semibold text-slate-700">Laporan Otomatis</label>
                                <input type="checkbox" className="w-5 h-5 rounded cursor-pointer" defaultChecked />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            useEffect(() => { lucide.createIcons(); }, [user, activeTab]);

            if (!user) return <LoginPage onLogin={setUser} />;

            return (
                <div className="flex min-h-screen">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} isOpen={isSidebarOpen} setIsOpen={setIsSidebarOpen} />
                    
                    <div className="flex-1 flex flex-col main-content">
                        {/* Header */}
                        <header className="h-20 glass border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-50">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsSidebarOpen(true)} className="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                                    <i data-lucide="menu" className="w-6 h-6"></i>
                                </button>
                                <span className="font-extrabold text-slate-800 md:text-xl capitalize">{activeTab}</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="hidden md:block text-right">
                                    <p className="text-xs font-bold text-slate-800 leading-none">{user.name}</p>
                                    <p className="text-[10px] text-blue-500 font-bold uppercase mt-1">{user.role}</p>
                                </div>
                                <img src={`https://ui-avatars.com/api/?name=${user.name}&background=2563EB&color=fff`} className="w-10 h-10 rounded-2xl border-2 border-white shadow-sm" alt="profile" />
                            </div>
                        </header>

                        {/* Content Area */}
                        <main className="p-4 md:p-8 flex-1 overflow-x-hidden">
                            {activeTab === 'dashboard' && <Dashboard userName={user.name} />}
                            {activeTab === 'master' && <MasterData />}
                            {activeTab === 'transaksi' && <Transaksi />}
                            {activeTab === 'laporan' && <Laporan />}
                            {activeTab === 'settings' && <Settings />}
                        </main>
                    </div>

                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
